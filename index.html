function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
  return date.toISOString().slice(0, 10);
}
const addDays = (s, n) => { const d=new Date(s+"T00:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const addWeeks = (s, n) => addDays(s, n * 7);
const fmtMD = (s) => { const d=new Date(s+"T00:00:00"); return `${d.getMonth()+1}/${d.getDate()}`; };
const fmtYMD = (s) => { const d=new Date(s+"T00:00:00"); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; };
const weekRange = (s) => { const d=new Date(s+"T00:00:00"); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 – ${fmtMD(addDays(s,6))}`; };

/* ── calculation ── */
function dayCons(sales, bens) {
  const out = {};
  Object.entries(sales||{}).forEach(([bid,qty])=>{
    if(!qty)return;
    const b=bens.find(x=>x.id===bid);
    if(!b)return;
    b.ings.forEach(({id,p})=>{out[id]=(out[id]||0)+p*qty;});
  });
  return out;
}
function weekSummary(wk,ings,bens){
  const totPkg={},totCons={};
  for(let d=1;d<=7;d++){
    Object.entries(wk?.dailyPurchases?.[d]||{}).forEach(([id,v])=>{if(v)totPkg[id]=(totPkg[id]||0)+Number(v);});
    Object.entries(dayCons(wk?.dailySales?.[d],bens)).forEach(([id,v])=>{totCons[id]=(totCons[id]||0)+v;});
  }
  return ings.map(ing=>{
    const open=Number(wk?.openingStock?.[ing.id]||0);
    const pkg=totPkg[ing.id]||0;
    const pts=pkg*ing.cppu;
    const cons=totCons[ing.id]||0;
    const sysEnd=open+pts-cons;
    const actual=wk?.actualCount?.[ing.id]??null;
    const diff=actual!==null?Number(actual)-sysEnd:null;
    return{...ing,open,pkg,pts,cons,sysEnd,actual,diff};
  });
}
function runStock(wk,ings,bens,upToDay){
  let stock={...(wk?.openingStock||{})};
  for(let d=1;d<=upToDay;d++){
    Object.entries(wk?.dailyPurchases?.[d]||{}).forEach(([id,v])=>{
      if(v){const ing=ings.find(i=>i.id===id);if(ing)stock[id]=(stock[id]||0)+Number(v)*ing.cppu;}
    });
    Object.entries(dayCons(wk?.dailySales?.[d],bens)).forEach(([id,v])=>{stock[id]=(stock[id]||0)-v;});
  }
  return stock;
}

/* ── AI 掃描單據 ── */
function ScanModal({onClose,day,week,ings,bens,purch,sales,onImport}){
  const [type,setType]=useState("進貨單");
  const [status,setStatus]=useState("idle");
  const [result,setResult]=useState(null);
  const [preview,setPreview]=useState(null);
  const fileRef=React.useRef();

  const handleFile=async e=>{
    const file=e.target.files[0];if(!file)return;
    const previewUrl=URL.createObjectURL(file);
    setPreview(previewUrl);
    setStatus("loading");
    setResult(null);
    try{
      const base64=await new Promise(res=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result.split(",")[1]);
        r.readAsDataURL(file);
      });
      const mediaType=file.type||"image/jpeg";

      const ingList=ings.map(i=>`id:${i.id} 名稱:${i.name} 單位:${i.pu}`).join("\n");
      const benList=bens.map(b=>`id:${b.id} 名稱:${b.name}`).join("\n");

      const prompt=type==="進貨單"
        ?`這是一張便當店進貨單，請仔細辨識所有品項名稱和進貨數量。\n\n系統已知食材（請盡量匹配）：\n${ingList}\n\n請只回傳純JSON，不要有任何說明文字或markdown符號：\n{"items":[{"name":"單據上的原始名稱","matched_id":"最接近的食材id，完全無法匹配則填null","quantity":數字}]}`
        :`這是一張便當店銷售單，請仔細辨識所有便當品項和銷售數量。\n\n系統已知便當：\n${benList}\n\n請只回傳純JSON，不要有任何說明文字或markdown符號：\n{"items":[{"name":"單據上的原始名稱","matched_id":"最接近的便當id，完全無法匹配則填null","quantity":數字}]}`;

      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
            {type:"text",text:prompt}
          ]}]
        })
      });
      const data=await resp.json();
      const text=data.content.filter(c=>c.type==="text").map(c=>c.text).join("");
      const clean=text.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(clean));
      setStatus("done");
    }catch(err){
      console.error(err);
      setStatus("error");
    }
    e.target.value="";
  };

  const doImport=()=>{
    if(!result)return;
    const merged={};
    result.items.forEach(item=>{
      if(item.matched_id&&item.quantity>0) merged[item.matched_id]=(merged[item.matched_id]||0)+item.quantity;
    });
    onImport(type==="進貨單"?"purchase":"sales",merged);
    onClose();
  };

  const matchedCount=result?.items?.filter(i=>i.matched_id).length||0;
  const totalCount=result?.items?.length||0;

  return(
    <Sheet title={`📷 AI 掃描${type}`} onClose={onClose}
      foot={status==="done"&&result&&matchedCount>0&&<PBtn label={`確認匯入 ${matchedCount} 項到星期${DAYS[day-1]}`} onClick={doImport}/>}>

      {/* 單據類型 */}
      <div style={{display:"flex",background:"#E8E4DE",borderRadius:10,padding:3,marginBottom:14}}>
        {["進貨單","銷售單"].map(t=>(
          <button key={t} onClick={()=>{setType(t);setStatus("idle");setResult(null);setPreview(null);}}
            style={{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
              background:type===t?G:"transparent",color:type===t?"#fff":MT}}>{t}</button>
        ))}
      </div>

      {/* 上傳區 */}
      {status==="idle"&&(
        <>
          <button onClick={()=>fileRef.current.click()} style={{
            width:"100%",padding:"28px 16px",borderRadius:14,border:`2px dashed ${BD}`,
            background:"#F9F8F6",cursor:"pointer",display:"flex",flexDirection:"column",
            alignItems:"center",gap:10,
          }}>
            <span style={{fontSize:42}}>📷</span>
            <span style={{fontSize:15,fontWeight:600,color:TX}}>拍照或上傳{type}</span>
            <span style={{fontSize:12,color:MT}}>支援 JPG、PNG，直接拍也可以</span>
          </button>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
        </>
      )}

      {/* 分析中 */}
      {status==="loading"&&(
        <div style={{textAlign:"center",padding:"32px 0"}}>
          {preview&&<img src={preview} style={{width:"100%",borderRadius:12,marginBottom:16,maxHeight:200,objectFit:"contain"}} alt="preview"/>}
          <div style={{fontSize:38,marginBottom:10}}>🤖</div>
          <div style={{fontSize:15,fontWeight:700,color:G}}>AI 分析中…</div>
          <div style={{fontSize:12,color:MT,marginTop:4}}>正在識別單據品項與數量</div>
        </div>
      )}

      {/* 失敗 */}
      {status==="error"&&(
        <div style={{textAlign:"center",padding:"32px 0"}}>
          <div style={{fontSize:38,marginBottom:10}}>❌</div>
          <div style={{fontSize:15,fontWeight:700,color:ERR}}>辨識失敗</div>
          <div style={{fontSize:12,color:MT,marginTop:4,marginBottom:16}}>請確認圖片清晰，或手動輸入</div>
          <PBtn label="重新上傳" onClick={()=>{setStatus("idle");setPreview(null);}}/>
        </div>
      )}

      {/* 結果 */}
      {status==="done"&&result&&(
        <div>
          {preview&&<img src={preview} style={{width:"100%",borderRadius:12,marginBottom:12,maxHeight:160,objectFit:"contain"}} alt="preview"/>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:TX}}>識別結果</div>
            <div style={{fontSize:12,color:MT}}>匹配 {matchedCount}/{totalCount} 項</div>
          </div>
          {result.items.map((item,i)=>{
            const matched=type==="進貨單"
              ?ings.find(x=>x.id===item.matched_id)
              :bens.find(x=>x.id===item.matched_id);
            return(
              <div key={i} style={{...crd,display:"flex",alignItems:"center",gap:10,
                borderLeft:`3px solid ${matched?WIN:BD}`,marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:TX}}>{item.name}</div>
                  {matched
                    ?<div style={{fontSize:11,color:WIN,marginTop:2}}>✓ {matched.name}</div>
                    :<div style={{fontSize:11,color:MT,marginTop:2}}>— 未匹配，不匯入</div>
                  }
                </div>
                <div style={{fontSize:17,fontWeight:800,color:matched?TX:MT}}>
                  {item.quantity}
                  {matched&&<span style={{fontSize:10,color:MT,marginLeft:2}}>{type==="進貨單"?matched.pu:""}</span>}
                </div>
              </div>
            );
          })}
          <button onClick={()=>{setStatus("idle");setResult(null);setPreview(null);}}
            style={{width:"100%",padding:"10px",borderRadius:10,border:`1px dashed ${BD}`,
              background:"transparent",color:MT,cursor:"pointer",fontSize:13,marginTop:4}}>
            重新掃描
          </button>
        </div>
      )}
    </Sheet>
  );
}

/* ── DailyTab ── */
function DailyTab({wk,week,ings,bens,onUpd}){
  const today=new Date().toISOString().slice(0,10);
  const thisWeek=getMonday(new Date());
  const [day,setDay]=useState(()=>{
    if(week===thisWeek){for(let i=0;i<7;i++)if(addDays(week,i)===today)return i+1;}
    return 1;
  });
  const [sec,setSec]=useState("sales");
  const [showStock,setShowStock]=useState(false);
  const [showScan,setShowScan]=useState(false);

  const sales=wk?.dailySales?.[day]||{};
  const purch=wk?.dailyPurchases?.[day]||{};
  const totalSold=Object.values(sales).reduce((a,b)=>a+(Number(b)||0),0);
  const cons=dayCons(sales,bens);
  const stock=showStock?runStock(wk,ings,bens,day):null;

  const upd=(patch)=>onUpd({...(wk||{}),weekStart:week,...patch});
  const setSales=(bid,v)=>{
    const n=parseInt(v)||0; const nxt={...sales};
    if(n>0)nxt[bid]=n;else delete nxt[bid];
    upd({dailySales:{...(wk?.dailySales||{}),[day]:nxt}});
  };
  const setPurch=(iid,v)=>{
    const n=parseFloat(v)||0; const nxt={...purch};
    if(n>0)nxt[iid]=n;else delete nxt[iid];
    upd({dailyPurchases:{...(wk?.dailyPurchases||{}),[day]:nxt}});
  };

  const onScanImport=(type,data)=>{
    if(type==="purchase"){
      upd({dailyPurchases:{...(wk?.dailyPurchases||{}),[day]:{...purch,...data}}});
    }else{
      upd({dailySales:{...(wk?.dailySales||{}),[day]:{...sales,...data}}});
    }
  };

  return(
    <div style={{padding:"0 16px 20px"}}>
      {showScan&&<ScanModal onClose={()=>setShowScan(false)} day={day} week={week} ings={ings} bens={bens} purch={purch} sales={sales} onImport={onScanImport}/>}
      {/* Day chips */}
      <div style={{display:"flex",gap:5,overflowX:"auto",padding:"12px 0 8px"}}>
        {DAYS.map((lbl,i)=>{
          const dn=i+1,ds=addDays(week,i);
          const hasDat=Object.values(wk?.dailySales?.[dn]||{}).some(v=>v>0)||Object.values(wk?.dailyPurchases?.[dn]||{}).some(v=>v>0);
          const isToday=ds===today&&week===thisWeek;
          return(
            <button key={dn} onClick={()=>setDay(dn)} style={{
              flexShrink:0,minWidth:44,padding:"7px 6px",borderRadius:10,border:"none",cursor:"pointer",
              background:day===dn?G:hasDat?GL:"#E8E4DE",color:day===dn?"#fff":TX,

/* ── ReportTab ── */
function ReportTab({wk,week,weeks,ings,bens,onUpd,onSwWeeks,onExport}){
  const [mode,setMode]=useState(null);
  const summ=weekSummary(wk,ings,bens);
  const bentoTotals=bens.map(b=>({...b,total:Array.from({length:7},(_,i)=>Number(wk?.dailySales?.[i+1]?.[b.id]||0)).reduce((a,c)=>a+c,0)}));
  const grandTotal=bentoTotals.reduce((a,b)=>a+b.total,0);

  const setOpen=(id,v)=>onUpd({...(wk||{}),weekStart:week,openingStock:{...(wk?.openingStock||{}),[id]:parseFloat(v)||0}});
  const setActual=(id,v)=>onUpd({...(wk||{}),weekStart:week,actualCount:{...(wk?.actualCount||{}),[id]:parseFloat(v)||0}});
  const copyToNext=()=>{
    if(!wk?.actualCount||Object.keys(wk.actualCount).length===0){alert("請先輸入本週實際盤點數量");return;}
    const nw=addWeeks(week,1);
    const existing=weeks.find(w=>w.weekStart===nw)||{};
    const updated={...existing,weekStart:nw,openingStock:{...wk.actualCount}};
    const rest=(weeks||[]).filter(w=>w.weekStart!==nw);
    onSwWeeks([...rest,updated]);
    alert(`已將本週實際盤點設為 ${fmtMD(nw)} 週期初`);
  };

  return(
    <div style={{padding:"0 16px 20px"}}>
      <div style={{display:"flex",gap:6,marginTop:12,marginBottom:8}}>
        <button onClick={()=>setMode(mode==="open"?null:"open")} style={{flex:1,padding:"9px 6px",borderRadius:10,cursor:"pointer",border:`1.5px solid ${G}`,fontSize:12,fontWeight:600,background:mode==="open"?G:"#fff",color:mode==="open"?"#fff":G}}>📋 期初設定</button>
        <button onClick={()=>setMode(mode==="actual"?null:"actual")} style={{flex:1,padding:"9px 6px",borderRadius:10,cursor:"pointer",border:"1.5px solid #7C3AED",fontSize:12,fontWeight:600,background:mode==="actual"?"#7C3AED":"#fff",color:mode==="actual"?"#fff":"#7C3AED"}}>🔍 實際盤點</button>
        <button onClick={onExport} style={{flex:1,padding:"9px 6px",borderRadius:10,cursor:"pointer",border:"none",background:ACC,color:"#fff",fontSize:12,fontWeight:600}}>📊 匯出Excel</button>
      </div>
      <button onClick={copyToNext} style={{width:"100%",padding:"9px",borderRadius:10,border:`1px dashed ${GM}`,background:"transparent",color:GM,cursor:"pointer",fontSize:12,fontWeight:600,marginBottom:10}}>
        → 將本週實際盤點設為下週期初
      </button>

      <div style={{...crd,background:G,color:"#fff"}}>
        <div style={{fontWeight:700,marginBottom:8,fontSize:14,display:"flex",justifyContent:"space-between"}}>
          <span>本週便當銷售</span><span style={{fontSize:18,fontWeight:800}}>{grandTotal} 份</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
          {bentoTotals.filter(b=>b.total>0).map(b=>(
            <div key={b.id} style={{display:"flex",justifyContent:"space-between",background:"rgba(255,255,255,0.12)",borderRadius:6,padding:"4px 8px",fontSize:13}}>
              <span>{b.name}</span><span style={{fontWeight:700}}>{b.total}</span>
            </div>
          ))}
        </div>
      </div>

      {summ.map(row=>{
        const isLoss=row.diff!==null&&row.diff<0;
        const isGain=row.diff!==null&&row.diff>0;
        const hasActual=row.actual!==null;
        const accent=hasActual?(isLoss?ERR:isGain?WIN:BD):BD;
        return(
          <div key={row.id} style={{...crd,borderLeft:`4px solid ${accent}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontWeight:700,fontSize:15}}>{row.name}</span>
              <span style={{fontSize:11,color:MT,background:"#F3F0EC",borderRadius:6,padding:"2px 8px"}}>1{row.pu}={row.cppu}{row.cu}</span>
            </div>
            {mode==="open"&&(
              <div style={{marginBottom:10,padding:"8px",background:"#F0FDF4",borderRadius:8,border:`1px solid ${GL}`}}>
                <div style={{fontSize:11,color:MT,marginBottom:5}}>上期期初庫存（{row.cu}）</div>
                <input type="number" min="0" inputMode="decimal" value={row.open||""} onChange={e=>setOpen(row.id,e.target.value)} style={{...inp,padding:"8px 10px",fontSize:14}} placeholder="0"/>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              <MiniStat label="上期期初" val={row.open} unit={row.cu}/>
              <MiniStat label="本週進貨" val={`${row.pkg}${row.pu}`} unit={`(${row.pts}${row.cu})`}/>
              <MiniStat label="本週耗量" val={row.cons} unit={row.cu}/>
              <MiniStat label="系統期末" val={row.sysEnd%1===0?row.sysEnd:row.sysEnd.toFixed(1)} unit={row.cu} color={GM} bg="#F0FDF4"/>
              {mode==="actual"?(
                <div>
                  <div style={{fontSize:10,color:MT,marginBottom:4}}>實際盤點</div>
                  <input type="number" min="0" inputMode="decimal" value={row.actual??""} onChange={e=>setActual(row.id,e.target.value)} style={{...inp,padding:"7px 8px",fontSize:14}} placeholder="0"/>
                </div>
              ):(
                <MiniStat label="實際盤點" val={row.actual!==null?row.actual:"–"} unit={row.actual!==null?row.cu:""}/>
              )}
              <MiniStat
                label={row.diff===null?"耗損/盈益":row.diff<0?"耗損 ▲":row.diff>0?"盈益 ▼":"持平 ✓"}
                val={row.diff===null?"–":Math.abs(row.diff)%1===0?Math.abs(row.diff):Math.abs(row.diff).toFixed(1)}
                unit={row.diff!==null?row.cu:""}
                color={row.diff===null?MT:row.diff<0?ERR:row.diff>0?WIN:MT}
              />
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── BentosTab ── */
function BentosTab({bens,ings,onSave}){
  const [ed,setEd]=useState(null);
  const openAdd=()=>setEd({id:uid(),name:"",ings:[]});
  const openEdit=b=>setEd(JSON.parse(JSON.stringify(b)));
  const del=id=>{if(confirm("確定刪除這個便當？"))onSave(bens.filter(b=>b.id!==id));};
  const save=()=>{
    if(!ed.name.trim())return;
    const exists=bens.find(b=>b.id===ed.id);
    onSave(exists?bens.map(b=>b.id===ed.id?ed:b):[...bens,ed]);
    setEd(null);
  };
  const toggleIng=iid=>{
    const has=ed.ings.find(x=>x.id===iid);
    setEd({...ed,ings:has?ed.ings.filter(x=>x.id!==iid):[...ed.ings,{id:iid,p:1}]});
  };
  const setP=(iid,v)=>setEd({...ed,ings:ed.ings.map(x=>x.id===iid?{...x,p:parseFloat(v)||1}:x)});

  return(
    <div style={{padding:"12px 16px 20px"}}>
      <PBtn label="＋ 新增便當類型" onClick={openAdd} style={{marginBottom:12}}/>
      {bens.map(b=>(
        <div key={b.id} style={{...crd,display:"flex",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15}}>{b.name}</div>
            <div style={{fontSize:11,color:MT,marginTop:3}}>
              {b.ings.map(({id:iid,p})=>{const ing=ings.find(x=>x.id===iid);return ing?`${ing.name}×${p}${ing.cu}`:null;}).filter(Boolean).join("、")}
            </div>
          </div>
          <button onClick={()=>openEdit(b)} style={{background:GL,border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:G,fontWeight:600,fontSize:12,flexShrink:0}}>編輯</button>
          <button onClick={()=>del(b.id)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:ERR,fontWeight:600,fontSize:12,flexShrink:0}}>刪除</button>
        </div>
      ))}
      {ed&&(
        <Sheet title={bens.find(b=>b.id===ed.id)?"編輯便當":"新增便當"} onClose={()=>setEd(null)} foot={<PBtn label="儲存" onClick={save}/>}>
          <Fld label="便當名稱">
            <input value={ed.name} onChange={e=>setEd({...ed,name:e.target.value})} style={inp} placeholder="例：招牌便當"/>
          </Fld>
          <div style={{fontSize:12,color:MT,fontWeight:600,marginBottom:8}}>勾選食材，設定每份用量</div>
          {ings.map(ing=>{
            const sel=ed.ings.find(x=>x.id===ing.id);
            return(
              <div key={ing.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"10px",background:sel?"#F0FDF4":"#F9F8F6",borderRadius:10,border:`1px solid ${sel?GL:BD}`}}>
                <div onClick={()=>toggleIng(ing.id)} style={{width:22,height:22,borderRadius:6,cursor:"pointer",flexShrink:0,border:`2px solid ${sel?G:BD}`,background:sel?G:"#fff",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700}}>{sel?"✓":""}</div>
                <div style={{flex:1,fontSize:14,fontWeight:sel?600:400}}>{ing.name}<span style={{color:MT,fontSize:11,marginLeft:4}}>/{ing.cu}</span></div>
                {sel&&<><input type="number" min="0.1" step="0.1" inputMode="decimal" value={sel.p} onChange={e=>setP(ing.id,e.target.value)} style={{...inp,width:62,textAlign:"center",padding:"7px"}}/><span style={{fontSize:12,color:MT,minWidth:20}}>{ing.cu}</span></>}
              </div>
            );
          })}
        </Sheet>
      )}
    </div>
  );
}

/* ── DataTab (備份/還原/菜單) ── */
function DataTab({ings,bens,weeks,shopName,onSaveIng,onSaveBen,onSaveWeeks}){
  const fileRef=React.useRef();
  const menuRef=React.useRef();
  const [msg,setMsg]=useState("");

  const showMsg=(m,ok=true)=>{setMsg({text:m,ok});setTimeout(()=>setMsg(""),3000);};

  /* 全資料備份 */
  const exportBackup=()=>{
    const data=JSON.stringify({v:1,shopName,ings,bens,weeks,exportedAt:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`Z01備份_${shopName||"店"}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showMsg("✅ 備份匯出成功");
  };

  /* 全資料還原 */
  const importBackup=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.ings||!data.bens)throw new Error();
        if(!confirm(`確定還原備份？\n匯出時間：${data.exportedAt||"未知"}\n\n⚠️ 目前所有資料將被覆蓋`))return;
        onSaveIng(data.ings);
        onSaveBen(data.bens);
        onSaveWeeks(data.weeks||[]);
        showMsg("✅ 備份還原成功");
      }catch{showMsg("❌ 檔案格式錯誤",false);}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  /* 菜單匯出（只含品項+便當設定，不含數字）*/
  const exportMenu=()=>{
    const data=JSON.stringify({v:1,type:"menu",ings,bens,exportedAt:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`Z01菜單設定_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showMsg("✅ 菜單設定匯出成功");
  };

  /* 菜單匯入（只更新品項+便當，不動歷史數字）*/
  const importMenu=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.ings||!data.bens||data.type!=="menu")throw new Error();
        if(!confirm(`確定更新菜單設定？\n匯出時間：${data.exportedAt||"未知"}\n\n✅ 歷史銷售紀錄不受影響`))return;
        onSaveIng(data.ings);
        onSaveBen(data.bens);
        showMsg("✅ 菜單更新成功，歷史紀錄保留");
      }catch{showMsg("❌ 檔案格式錯誤，請確認是菜單設定檔",false);}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const secStyle={...crd,marginBottom:16};
  const hdr={fontSize:14,fontWeight:700,color:TX,marginBottom:4};
  const sub={fontSize:12,color:MT,marginBottom:12};

  return(
    <div style={{padding:"12px 16px 20px"}}>
      {msg&&(
        <div style={{padding:"10px 14px",borderRadius:10,marginBottom:12,fontSize:13,fontWeight:600,
          background:msg.ok?"#F0FDF4":"#FEF2F2",color:msg.ok?WIN:ERR,border:`1px solid ${msg.ok?WIN:ERR}`}}>
          {msg.text}
        </div>
      )}

      {/* 全資料備份 */}
      <div style={secStyle}>
        <div style={hdr}>💾 全資料備份</div>
        <div style={sub}>備份所有資料（品項、便當、每週紀錄），換手機或清快取前請先備份</div>
        <div style={{display:"flex",gap:8}}>
          <PBtn label="匯出備份" onClick={exportBackup} style={{flex:1}}/>
          <button onClick={()=>fileRef.current.click()} style={{flex:1,padding:"12px 16px",borderRadius:12,border:`1.5px solid ${G}`,background:"#fff",color:G,fontSize:14,fontWeight:600,cursor:"pointer"}}>
            匯入還原
          </button>
          <input ref={fileRef} type="file" accept=".json" onChange={importBackup} style={{display:"none"}}/>
        </div>
      </div>

      {/* 菜單設定 */}
      <div style={secStyle}>
        <div style={hdr}>🍱 菜單設定（總部用）</div>
        <div style={sub}>只包含品項與便當設定，不含任何銷售數字。分店匯入後歷史紀錄完全保留。</div>
        <div style={{display:"flex",gap:8}}>
          <PBtn label="匯出菜單" onClick={exportMenu} color="#7C3AED" style={{flex:1}}/>
          <button onClick={()=>menuRef.current.click()} style={{flex:1,padding:"12px 16px",borderRadius:12,border:"1.5px solid #7C3AED",background:"#fff",color:"#7C3AED",fontSize:14,fontWeight:600,cursor:"pointer"}}>
            匯入菜單
          </button>
          <input ref={menuRef} type="file" accept=".json" onChange={importMenu} style={{display:"none"}}/>
        </div>
      </div>

      {/* 說明 */}
      <div style={{...crd,background:"#F8F7F4",border:`1px solid ${BD}`}}>
        <div style={{fontSize:13,fontWeight:700,color:TX,marginBottom:8}}>使用說明</div>
        {[
          ["💾 匯出備份","把所有資料存成 JSON 檔，定期備份用"],
          ["📂 匯入還原","換手機或資料遺失時，還原備份檔案"],
          ["📤 匯出菜單","總部更新品項後，匯出給各分店"],
          ["📥 匯入菜單","分店收到總部菜單檔案後匯入，自己的紀錄不受影響"],
        ].map(([t,d])=>(
          <div key={t} style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:600,color:TX}}>{t}</div>
            <div style={{fontSize:11,color:MT}}>{d}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Excel export ── */
function doExport(wk,ings,bens,week,shopName){
  const summ=weekSummary(wk,ings,bens);
  const wb=XLSX.utils.book_new();
  const s1=[
    ["Z01進銷存報表"],
    [`店名：${shopName||""}`,`週次：${weekRange(week)}`],
    [],
    ["品名","採購單位","計算單位","上期期初","本週進貨(包/箱)","本週進貨(份量)","本週耗量","系統期末庫存","實際盤點","耗損(-)盈益(+)","總進貨數(包/箱)"],
    ...summ.map(r=>[r.name,r.pu,r.cu,r.open,r.pkg,r.pts,r.cons,r.sysEnd%1===0?r.sysEnd:r.sysEnd.toFixed(1),r.actual??"",r.diff!==null?(r.diff%1===0?r.diff:r.diff.toFixed(1)):"",r.pkg]),
    [],["備註：小白單耗量 = 總進貨量 + 期初庫存 - 週日庫存 = 一週7天總銷量"],["需檢查：滷蛋與高麗菜"],
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),"週報表");
  const s2=[[`每日銷售明細 - ${weekRange(week)}`],[],["便當名稱","週一","週二","週三","週四","週五","週六","週日","本週合計"],
    ...bens.map(b=>{const d=Array.from({length:7},(_,i)=>Number(wk?.dailySales?.[i+1]?.[b.id]||0));return[b.name,...d,d.reduce((a,c)=>a+c,0)];})];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),"每日銷售");
  const s3=[[`每日進貨明細 - ${weekRange(week)}`],[],["品項","採購單位","週一","週二","週三","週四","週五","週六","週日","合計(包/箱)","合計(份量)"],
    ...ings.map(ing=>{const d=Array.from({length:7},(_,i)=>Number(wk?.dailyPurchases?.[i+1]?.[ing.id]||0));const tot=d.reduce((a,c)=>a+c,0);return[ing.name,ing.pu,...d,tot,tot*ing.cppu];})];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s3),"每日進貨");
  XLSX.writeFile(wb,`Z01進銷存_${shopName||"店"}_${week}.xlsx`);
}

/* ── APP ROOT ── */
const TABS=[
  {id:"daily",icon:"📝",label:"每日記錄"},
  {id:"report",icon:"📊",label:"週報表"},
  {id:"bentos",icon:"🍱",label:"便當設定"},
  {id:"ingredients",icon:"📦",label:"品項管理"},
  {id:"data",icon:"🔧",label:"備份/菜單"},
];

function App(){
  const [tab,setTab]=useState("daily");
  const [ings,setIngs]=useState(null);
  const [bens,setBens]=useState(null);
  const [weeks,setWeeks]=useState(null);
  const [week,setWeek]=useState(getMonday(new Date()));
  const [shopName,setShopName]=useState("");
  const [editingShop,setEditingShop]=useState(false);
  const [shopDraft,setShopDraft]=useState("");

  useEffect(()=>{
    (async()=>{
      const [i,b,w,sn]=await Promise.all([sg(SK.ing,D_ING),sg(SK.ben,D_BEN),sg(SK.wks,[]),sg(SK.shop,"")]);
      setIngs(i);setBens(b);setWeeks(w);setShopName(sn||"");
    })();
  },[]);

  const si=async d=>{setIngs(d);await ss(SK.ing,d);};
  const sb=async d=>{setBens(d);await ss(SK.ben,d);};
  const sw=async d=>{setWeeks(d);await ss(SK.wks,d);};
  const saveShop=async name=>{setShopName(name);await ss(SK.shop,name);};

  const wk=weeks?.find(w=>w.weekStart===week)||null;
  const updWk=async patch=>{
    const base=wk||{weekStart:week,openingStock:{},dailySales:{},dailyPurchases:{},actualCount:{}};
    const updated={...base,...patch,weekStart:week};
    if(patch.dailySales)updated.dailySales={...(base.dailySales||{}),...patch.dailySales};
    if(patch.dailyPurchases)updated.dailyPurchases={...(base.dailyPurchases||{}),...patch.dailyPurchases};
    if(patch.openingStock)updated.openingStock={...(base.openingStock||{}),...patch.openingStock};
    if(patch.actualCount)updated.actualCount={...(base.actualCount||{}),...patch.actualCount};
    const rest=(weeks||[]).filter(w=>w.weekStart!==week);
    await sw([...rest,updated]);
  };

  if(!ings||!bens||!weeks)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:BG,flexDirection:"column",gap:12}}>
      <div style={{fontSize:52}}>🍱</div>
      <div style={{color:G,fontSize:18,fontWeight:700}}>Z01 進銷存</div>
      <div style={{color:MT,fontSize:13}}>載入中…</div>
    </div>
  );

  return(
    <div style={{maxWidth:480,margin:"0 auto",background:BG,minHeight:"100vh",fontFamily:"system-ui,-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif"}}>
      {/* Header */}
      <div style={{background:G,color:"#fff",padding:"12px 16px",position:"sticky",top:0,zIndex:200}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{flex:1,minWidth:0}}>
            {editingShop?(
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input autoFocus value={shopDraft} onChange={e=>setShopDraft(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"){saveShop(shopDraft);setEditingShop(false);}if(e.key==="Escape")setEditingShop(false);}}
                  style={{flex:1,background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:8,padding:"4px 10px",color:"#fff",fontSize:15,fontWeight:700,outline:"none"}}
                  placeholder="輸入店名…"/>
                <button onClick={()=>{saveShop(shopDraft);setEditingShop(false);}} style={{background:"rgba(255,255,255,0.25)",border:"none",borderRadius:8,padding:"5px 10px",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>儲存</button>
              </div>
            ):(
              <div onClick={()=>{setShopDraft(shopName);setEditingShop(true);}} style={{cursor:"pointer"}}>
                <div style={{fontSize:16,fontWeight:800,letterSpacing:0.5}}>
                  {shopName||<span style={{opacity:0.5,fontWeight:400,fontSize:13}}>點此設定店名</span>}
                  <span style={{fontSize:11,opacity:0.6,marginLeft:6,fontWeight:400}}>✏️</span>
                </div>
                <div style={{fontSize:10,color:GL,marginTop:1}}>Z01 進銷存管理系統</div>
              </div>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <button onClick={()=>setWeek(addWeeks(week,-1))} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"5px 10px",fontSize:16,cursor:"pointer",color:"#fff"}}>‹</button>
            <input
              type="date"
              value={week}
              onChange={e=>{ if(e.target.value) setWeek(getMonday(e.target.value)); }}
              style={{
                background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.4)",
                borderRadius:8,padding:"5px 8px",color:"#fff",fontSize:11,fontWeight:700,
                outline:"none",cursor:"pointer",width:130,textAlign:"center",
                colorScheme:"dark",
              }}
            />
            <button onClick={()=>setWeek(addWeeks(week,1))} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"5px 10px",fontSize:16,cursor:"pointer",color:"#fff"}}>›</button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{paddingBottom:76}}>
        {tab==="daily"&&<DailyTab wk={wk} week={week} ings={ings} bens={bens} onUpd={updWk}/>}
        {tab==="report"&&<ReportTab wk={wk} week={week} weeks={weeks} ings={ings} bens={bens} onUpd={updWk} onSwWeeks={sw} onExport={()=>doExport(wk,ings,bens,week,shopName)}/>}
        {tab==="bentos"&&<BentosTab bens={bens} ings={ings} onSave={sb}/>}
        {tab==="ingredients"&&<IngredientsTab ings={ings} onSave={si}/>}
        {tab==="data"&&<DataTab ings={ings} bens={bens} weeks={weeks} shopName={shopName} onSaveIng={si} onSaveBen={sb} onSaveWeeks={sw}/>}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:`1px solid ${BD}`,display:"flex",zIndex:200}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",background:"none",padding:"10px 4px 10px",color:tab===t.id?G:MT,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:tab===t.id?`2px solid ${G}`:"2px solid transparent"}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
